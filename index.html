      setTransactions(prev => prev ? { ...prev, transactions: prev.transactions.map(t => t.id === optimisticId ? { ...t, id: result.name } : t) } : prev);

      sheetsSync({ action: "addTransaction", ...form, firebaseId: result.name });

        if (transaction.account === "Portfolio") accts.portfolio = toNum(accts.portfolio) - transaction.amount;
        if (transaction.account === "Lifestyle") accts.lifestyle = toNum(accts.lifestyle) - transaction.amount;
        if (transaction.account === "Wedding") accts.home = toNum(accts.home) - transaction.amount; // wedding deducts from home

      const ok = await fb.remove(`transactions/${transaction.id}`);

        React.createElement("div", { style: { fontSize: 11, color: C.muted, fontFamily: MONO } }, (new Date()).toLocaleDateString("en-US", { month: "short", day: "numeric" }))
      ),
      React.createElement("div", { style: { padding: "0 16px 100px" } },
        page === "transactions" && React.createElement(TransactionsPage, { data: transactions, dashData: dashboard, onAdd: addTransaction, onRefresh: load, onDelete: deleteTransaction, loading }),

        page === "investments" && React.createElement(InvestmentsPage, { data: investments, onRefresh: load, loading })

      React.createElement("div", { style: { position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: "rgba(255,255,255,0.95)", backdropFilter: "blur(12px)", borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-around", padding: "6px 8px env(safe-area-inset-bottom, 10px)", zIndex: 100 } },
        React.createElement(NavButton, { icon: "wallet", label: "Txns", active: page === "transactions", onClick: () => setPage("transactions") }),

        React.createElement(NavButton, { icon: "ring", label: "Wedding", active: page === "wedding", onClick: () => setPage("wedding") }),

  }

})();
