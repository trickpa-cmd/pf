const { useState, useEffect, useCallback, useMemo } = React;

// --- CONFIG & UTILS ---
const API_URL = "https://script.google.com/macros/s/AKfycbxtRIEhkYHpW9iNkOydrLOq96yfbN-GciPzIq6FUkSfsjZjqjP11gb1QC8Tp02zNgYTyQ/exec";

const api = {
  async get(action) {
    try {
      const r = await fetch(`${API_URL}?action=${action}`);
      return await r.json();
    } catch (e) { console.error(e); return null; }
  },
  async post(data) {
    try {
      const r = await fetch(API_URL, { method: "POST", body: JSON.stringify(data) });
      return await r.json();
    } catch (e) { console.error(e); return null; }
  },
};

// Fixed Formatting to prevent NaN
const fmt = (n) => {
  let num = typeof n === 'string' ? parseFloat(n.replace(/[^0-9.-]+/g, "")) : n;
  if (num === null || num === undefined || isNaN(num)) return "$0";
  const a = Math.abs(num);
  const s = a >= 1000 ? a.toLocaleString("en-US", {minimumFractionDigits: 0, maximumFractionDigits: 0}) : a.toFixed(0);
  return num < 0 ? `-$${s}` : `$${s}`;
};

const pct = (n) => `${(n * 100).toFixed(1)}%`;
